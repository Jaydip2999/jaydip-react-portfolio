<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Event management dashboard preview</title>
  <desc id="desc">A polished dark event management dashboard mockup with revenue cards, event table, and admin sidebar.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#082734"/>
      <stop offset="1" stop-color="#06101c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#1d4f5b" stroke-opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" fill="url(#page)"/>
  <rect width="1200" height="760" fill="url(#grid)" opacity="0.75"/>
  <circle cx="1060" cy="90" r="220" fill="#22d3ee" opacity="0.08"/>
  <circle cx="118" cy="642" r="240" fill="#34d399" opacity="0.1"/>

  <g filter="url(#shadow)">
    <rect x="92" y="74" width="1016" height="612" rx="34" fill="#0b1727" stroke="#244055" stroke-width="2"/>
  </g>

  <rect x="92" y="74" width="232" height="612" rx="34" fill="#080f1c"/>
  <path d="M324 108v544" stroke="#1f3547" stroke-width="2"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="132" y="136" fill="#22d3ee" font-size="28" font-weight="800">UTTSAV</text>
    <text x="132" y="166" fill="#8ea4bd" font-size="15">Admin control panel</text>

    <rect x="126" y="214" width="164" height="44" rx="14" fill="#112238"/>
    <circle cx="150" cy="236" r="9" fill="url(#accent)"/>
    <text x="174" y="243" fill="#e6f0ff" font-size="15" font-weight="700">Dashboard</text>

    <rect x="126" y="280" width="164" height="44" rx="14" fill="#0d1728"/>
    <circle cx="150" cy="302" r="9" fill="#a78bfa"/>
    <text x="174" y="308" fill="#a9bbd2" font-size="15" font-weight="700">Events</text>

    <rect x="126" y="346" width="164" height="44" rx="14" fill="#0d1728"/>
    <circle cx="150" cy="368" r="9" fill="#fbbf24"/>
    <text x="174" y="374" fill="#a9bbd2" font-size="15" font-weight="700">Payments</text>

    <rect x="126" y="574" width="160" height="58" rx="18" fill="#2a1726" stroke="#5b2d44"/>
    <text x="148" y="606" fill="#fb7185" font-size="18" font-weight="800">Logout</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="372" y="139" fill="#f8fbff" font-size="34" font-weight="800">Event Management</text>
    <text x="372" y="171" fill="#97acc5" font-size="16">Manage bookings, organizers, revenue, and live event requests.</text>

    <rect x="372" y="214" width="198" height="116" rx="24" fill="#132536" stroke="#29475b"/>
    <rect x="402" y="244" width="54" height="54" rx="16" fill="#113a42"/>
    <path d="M421 278c0-15 16-24 30-16v32c-14 8-30-1-30-16z" fill="#22d3ee"/>
    <text x="482" y="258" fill="#bdcada" font-size="15" font-weight="700">Total Users</text>
    <text x="482" y="296" fill="#ffffff" font-size="36" font-weight="800">7</text>

    <rect x="594" y="214" width="198" height="116" rx="24" fill="#132536" stroke="#29475b"/>
    <rect x="624" y="244" width="54" height="54" rx="16" fill="#143d2f"/>
    <circle cx="651" cy="264" r="13" fill="#34d399"/>
    <path d="M631 292c4-18 36-18 40 0z" fill="#34d399"/>
    <text x="704" y="258" fill="#bdcada" font-size="15" font-weight="700">Organizers</text>
    <text x="704" y="296" fill="#ffffff" font-size="36" font-weight="800">2</text>

    <rect x="816" y="214" width="234" height="116" rx="24" fill="#132536" stroke="#29475b"/>
    <rect x="846" y="244" width="54" height="54" rx="16" fill="#3c3521"/>
    <path d="M873 257v18l14 9" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="926" y="258" fill="#bdcada" font-size="15" font-weight="700">Pending Requests</text>
    <text x="926" y="296" fill="#ffffff" font-size="36" font-weight="800">0</text>

    <rect x="372" y="374" width="678" height="250" rx="28" fill="#101d2d" stroke="#254258"/>
    <text x="406" y="424" fill="#e6f0ff" font-size="22" font-weight="800">Revenue Overview</text>
    <rect x="406" y="456" width="184" height="98" rx="22" fill="#142838" stroke="#29475b"/>
    <text x="436" y="494" fill="#bdcada" font-size="14" font-weight="700">Total Revenue</text>
    <text x="436" y="529" fill="#ffffff" font-size="30" font-weight="800">Rs 276</text>

    <rect x="614" y="456" width="184" height="98" rx="22" fill="#142838" stroke="#29475b"/>
    <text x="644" y="494" fill="#bdcada" font-size="14" font-weight="700">Platform</text>
    <text x="644" y="529" fill="#22d3ee" font-size="30" font-weight="800">Rs 82</text>

    <rect x="822" y="456" width="184" height="98" rx="22" fill="#142838" stroke="#29475b"/>
    <text x="852" y="494" fill="#bdcada" font-size="14" font-weight="700">Organizer</text>
    <text x="852" y="529" fill="#34d399" font-size="30" font-weight="800">Rs 193</text>

    <rect x="406" y="584" width="600" height="10" rx="5" fill="#1a3042"/>
    <rect x="406" y="584" width="430" height="10" rx="5" fill="url(#warm)"/>
  </g>
</svg>
