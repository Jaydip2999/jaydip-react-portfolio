    <text x="474" y="348" fill="#f8fbff" font-size="48" font-weight="900">Jaydip Dumraliya</text>
    <text x="474" y="390" fill="#22d3ee" font-size="26" font-weight="800">Modern web products.</text>
    <text x="474" y="446" fill="#a9bbd2" font-size="18" font-weight="600">Responsive portfolio, clean UI, fast pages,</text>
    <text x="474" y="478" fill="#a9bbd2" font-size="18" font-weight="600">and polished project presentation.</text>

