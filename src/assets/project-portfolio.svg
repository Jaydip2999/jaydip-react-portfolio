<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio website preview</title>
  <desc id="desc">A polished dark portfolio website mockup with hero section, project cards, and skills panel.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#082734"/>
      <stop offset="1" stop-color="#06101c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#1d4f5b" stroke-opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" fill="url(#page)"/>
  <rect width="1200" height="760" fill="url(#grid)" opacity="0.75"/>
  <circle cx="1038" cy="96" r="220" fill="#22d3ee" opacity="0.08"/>
  <circle cx="122" cy="638" r="240" fill="#34d399" opacity="0.1"/>

